<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 160" width="160" height="160">
  <defs>
    <linearGradient id="navyGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#0D2340"/>
      <stop offset="100%" stop-color="#1A3A5C"/>
    </linearGradient>
  </defs>

  <!-- Fundo quadrado com cantos levemente arredondados -->
  <rect x="8" y="8" width="144" height="144" rx="6" ry="6"
        fill="none" stroke="url(#navyGrad2)" stroke-width="2.5"/>

  <!-- Colchete esquerdo interno -->
  <g stroke="url(#navyGrad2)" stroke-width="4" stroke-linecap="butt" fill="none">
    <polyline points="44,36 28,36 28,124 44,124"/>
  </g>

  <!-- AE centralizado -->
  <text
    x="80" y="115"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="72"
    font-weight="700"
    fill="url(#navyGrad2)"
    text-anchor="middle"
    letter-spacing="-4">AE</text>

  <!-- Colchete direito interno -->
  <g stroke="url(#navyGrad2)" stroke-width="4" stroke-linecap="butt" fill="none">
    <polyline points="116,36 132,36 132,124 116,124"/>
  </g>
</svg>
